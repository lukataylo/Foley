# Auto-drafted by Foley's first-cut proposer. Edit any step in the studio or rerun `director propose-steps <id>` to redraft.
version: 1
display_name: Foley
target_app:
  repo: lukataylo/Foley
  dev_url: http://localhost:3000
brand_ref: brand.yaml
steps:
- id: intro
  title: Welcome to Cutroom
  narration: This is Foley's Cutroom, where auto-generated product walkthrough videos land for review.
  actions:
  - kind: goto
    url: /
  - kind: wait
    ms: 3500
  duration_ms: 5000
  viewport:
    width: 1440
    height: 900
- id: browse_folders
  title: Project folders
  narration: Every connected repo gets its own folder, showing step counts, takes, and who last touched
    it.
  actions:
  - kind: scroll
    ms: 400
  - kind: wait
    ms: 2500
  duration_ms: 6000
  viewport:
    width: 1440
    height: 900
- id: open_walkthrough
  title: Open a walkthrough
  narration: Opening the Foley project reveals the full walkthrough Foley built automatically from pull
    request activity.
  actions:
  - kind: goto
    url: /walkthroughs/foley
  - kind: wait
    ms: 2800
  duration_ms: 6000
  viewport:
    width: 1440
    height: 900
- id: review_steps
  title: Review the steps
  narration: Each step is a short clip with narration Foley generated to match the code change in that
    PR.
  actions:
  - kind: scroll
    ms: 500
  - kind: wait
    ms: 2500
  duration_ms: 6500
  viewport:
    width: 1440
    height: 900
- id: approve_take
  title: Approve and ship
  narration: Once you approve a take, Foley stitches the clips into a finished video and keeps it current
    with every new PR.
  actions:
  - kind: scroll
    ms: 500
  - kind: wait
    ms: 3000
  duration_ms: 7000
  viewport:
    width: 1440
    height: 900
