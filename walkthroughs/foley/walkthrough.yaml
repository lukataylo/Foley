# Auto-drafted by Foley's first-cut proposer. Edit any step in the studio or rerun `director propose-steps <id>` to redraft.
version: 1
display_name: Foley
target_app:
  repo: lukataylo/Foley
  dev_url: http://localhost:3000
brand_ref: brand.yaml
steps:
- id: intro
  title: Foley home
  narration: This is Foley — every connected repo gets a folder showing its steps, takes, and last activity.
  actions:
  - kind: goto
    url: /
  - kind: wait
    ms: 4500
  duration_ms: 5000
  viewport:
    width: 1440
    height: 900
- id: open_walkthrough
  title: Open a walkthrough
  narration: Click into any walkthrough to see the master video, the takes Foley pulled from PRs, and the brand controls.
  actions:
  - kind: goto
    url: /walkthroughs/v1
  - kind: wait
    ms: 5500
  duration_ms: 6000
  viewport:
    width: 1440
    height: 900
- id: open_editor
  title: Edit and render
  narration: Jump into the editor to draft new steps, retake any clip, and render a fresh master video.
  actions:
  - kind: goto
    url: /walkthroughs/v1/edit
  - kind: wait
    ms: 7500
  duration_ms: 8000
  viewport:
    width: 1440
    height: 900
